name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_PAGES_TOKEN: ${{ secrets.PAGES_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Node version
        id: node
        shell: bash
        run: |
          if [ -f .nvmrc ]; then
            version="$(cat .nvmrc)"
          else
            version="$(grep -E '"node"\s*:' package.json | head -n 1 | sed -E 's/.*"node"\s*:\s*"([^"]+)".*/\1/')"
          fi
          if [ -z "$version" ]; then
            version="22"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          # GitHub Pages project site path, e.g. /astro-whono/
          ASTRO_WHONO_BASE_PATH: /${{ github.event.repository.name }}/
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: npm run build

      - name: Enable and setup Pages
        if: env.HAS_PAGES_TOKEN == 'true'
        uses: actions/configure-pages@v6
        with:
          token: ${{ secrets.PAGES_TOKEN }}
          enablement: true

      - name: Setup Pages
        if: env.HAS_PAGES_TOKEN != 'true'
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
